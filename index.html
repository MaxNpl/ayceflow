<!DOCTYPE html>
<html lang="it"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AYCEflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
 @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&display=swap');
 :root{--ink:#181821;--inkSoft:#262630;--paper:#FAF6EF;--surface:#FFF;--coral:#F2542D;--coralDeep:#D63E1C;--wasabi:#6F8F3E;--gold:#E0A100;--line:#ECE4D7;--muted:#76716A;--disp:'Bricolage Grotesque',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif}
 *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
 body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body)}
 .disp{font-family:var(--disp)} button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
 .tab{font-variant-numeric:tabular-nums}
 .noscroll::-webkit-scrollbar{display:none}
 @keyframes pop{0%{transform:scale(.85)}60%{transform:scale(1.08)}100%{transform:scale(1)}}.pop{animation:pop .22s ease-out}
 @keyframes spin{to{transform:rotate(360deg)}}.spin{display:inline-block;animation:spin 1s linear infinite}
 .wrap{max-width:1100px;margin:0 auto;padding:0 16px}
 .card{background:var(--surface);border:1px solid var(--line);border-radius:16px}
 .catbtn{flex:0 0 auto;padding:8px 16px;border-radius:999px;font-weight:700;font-size:14px;border:1px solid var(--line);background:var(--surface)}
 .catbtn.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
 .grid2{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:640px){.grid2{grid-template-columns:1fr 1fr}}
 .layout{display:grid;grid-template-columns:1fr;gap:24px;padding-bottom:150px}@media(min-width:1024px){.layout{grid-template-columns:1fr 360px;padding-bottom:40px}}
 .aside{display:none}@media(min-width:1024px){.aside{display:block}}
 .mobround{position:fixed;left:0;right:0;bottom:0;z-index:30}@media(min-width:1024px){.mobround{display:none}}
 .note{font-size:12px;margin-bottom:8px;padding:8px 12px;border-radius:8px;color:#fff}
 .muted{color:var(--muted)}
</style></head><body><div id="app"></div>

<!-- supabase js (dalla cdn, cosi' non serve installare niente) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
/* ============================================================================
   AYCEflow — APP TAVOLO
   Si apre dal QR: /index.html?l=<slug_locale>&t=<qr_token_tavolo>
   Il tavolo e' gia' deciso dal QR (niente da digitare).
   Il carrello e' CONDIVISO: sta su supabase, e col realtime tutti i telefoni
   del tavolo vedono le stesse cose muoversi in diretta.
   Le credenziali pienissimo NON sono qui: le tiene il server (edge function).
   ========================================================================== */
const CFG = window.AYCE_CFG;
const FN = CFG.SUPABASE_URL + "/functions/v1/";
const sb = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
const params = new URLSearchParams(location.search);
const SLUG = params.get("l"); const QR = params.get("t");

// stato locale (lo "specchio" di quello che c'e' sul server)
let LOCALE=null, TAVOLO=null, CART=null, MENU=[], GIRI=[], CONF={}, activeCat=null;
let now=Date.now(), sending=false, sendMsg={t:"",k:""}, seatedAt=Date.now();

/* ---- helper regole (le legge dalla config del locale) ---- */
const regola=id=>(CONF.regole&&CONF.regole[id])||{attivo:true,maxVolte:{value:0,scope:"tavolo"},maxPerGiro:0};
const coperti=()=>CART?CART.coperti:2;
const scaled=mv=>!mv.value?Infinity:(mv.scope==="persona"?mv.value*coperti():mv.value);
function sentCount(){const m={};GIRI.forEach(g=>Object.entries(g.items).forEach(([id,v])=>m[id]=(m[id]||0)+v.qty));return m;}
function qtyInCart(id){return CART&&CART.items[id]?CART.items[id].qty:0;}
function remaining(id){const r=regola(id),mx=scaled(r.maxVolte);if(mx===Infinity)return Infinity;const s=sentCount();return Math.max(0,mx-(s[id]||0)-qtyInCart(id));}
function perGiroLeft(id){const r=regola(id);if(!r.maxPerGiro)return Infinity;return Math.max(0,r.maxPerGiro-qtyInCart(id));}
const canAdd=id=>remaining(id)>0&&perGiroLeft(id)>0;
const isFav=id=>(CONF.preferiti||[]).includes(id);
const isEvid=id=>(CONF.evidenza||[]).includes(id);

/* ---- util ---- */
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
async function fn(name,body){const r=await fetch(FN+name,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+CFG.SUPABASE_ANON_KEY,"apikey":CFG.SUPABASE_ANON_KEY},body:JSON.stringify(body)});return r.json();}

/* ---- carrello: aggiungi/togli (atomico sul server) ---- */
async function modifica(id,delta){
  const p=MENU.find(x=>x.id==id)||{};
  if(delta>0&&!canAdd(id))return;
  // aggiornamento ottimistico per reattivita', poi il realtime conferma
  const { data } = await sb.rpc("carrello_modifica",{p_cart:CART.id,p_id:String(id),p_delta:delta,p_nome:p.name||"",p_cat:p.cat||""});
  if(data){CART=data;render();}
}
async function setCoperti(d){const v=Math.max(1,coperti()+d);const {data}=await sb.from("carrelli").update({coperti:v}).eq("id",CART.id).select().single();if(data){CART=data;render();}}

/* ---- invio giro ---- */
async function invia(){
  const g=globals(); if(!g.count||g.blocked||sending)return;
  sending=true;sendMsg={t:"",k:""};render();
  const res=await fn("send-order",{slug:SLUG,tavolo_id:TAVOLO.id});
  sending=false;
  if(res.ok){sendMsg={t:"Ordine #"+res.id_ordine+" in cucina",k:"ok"};}
  else{sendMsg={t:res.error||"Errore invio",k:"err"};}
  render();
  setTimeout(()=>{if(sendMsg.k==="ok"){sendMsg={t:"",k:""};render();}},5000);
}

function globals(){const G=CONF.global||{};
  const maxGiro=(G.maxPezziScope==="persona"?(G.maxPezziPerGiro||0)*coperti():(G.maxPezziPerGiro||0))||Infinity;
  const items=CART?Object.entries(CART.items).map(([id,v])=>({id,...v})):[];
  const count=items.reduce((n,i)=>n+i.qty,0);
  const cooldownLeft=Math.max(0,Math.ceil(((lastGiroAt()||0)+(G.cooldownMin||0)*60000-now)/1000));
  const tempoLeft=Math.max(0,(G.tempoTavoloMin||100)*60-Math.floor((now-seatedAt)/1000));
  return {maxGiro,items,count,over:count>maxGiro,cooldownLeft,tempoLeft,blocked:(count>maxGiro||cooldownLeft>0||tempoLeft===0)};}
function lastGiroAt(){return GIRI.length?new Date(GIRI[0].inviato_il).getTime():0;}

/* ============================ RENDER ============================ */
const app=document.getElementById("app");
function render(){
  if(!SLUG||!QR){app.innerHTML=msgBox("Scansiona il QR del tuo tavolo per ordinare.");return;}
  if(!TAVOLO){app.innerHTML=bootBox("Connessione…");return;}
  app.innerHTML=header()+bannerHTML()+bodyHTML();
}
const msgBox=t=>`<div style="max-width:420px;margin:0 auto;padding:80px 20px;text-align:center"><h1 class="disp" style="font-size:44px;color:var(--coral);margin:0">AYCEflow</h1><p class="muted" style="margin-top:16px">${esc(t)}</p></div>`;
const bootBox=t=>msgBox(t)+`<div style="text-align:center"><span class="spin" style="font-size:24px;color:var(--coral)">◠</span></div>`;

function header(){const g=globals(),lowTime=g.tempoLeft<900,showCop=CONF.coperti&&CONF.coperti.attivo;
 return `<header style="position:sticky;top:0;z-index:20;background:var(--ink);color:var(--paper)"><div class="wrap" style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px"><div style="display:flex;align-items:baseline;gap:12px"><span class="disp" style="font-size:24px;font-weight:800;color:var(--coral)">${esc(CONF.brand||LOCALE.nome)}</span><span class="disp" style="font-size:13px;font-weight:700;opacity:.6">${esc(CONF.formula||"")}</span></div><div style="display:flex;align-items:center;gap:8px;font-size:14px"><span style="padding:6px 12px;border-radius:999px;background:var(--inkSoft)"><span style="opacity:.6">Tavolo</span> <b>${esc(TAVOLO.numero)}</b></span>${showCop?`<span style="padding:6px 12px;border-radius:999px;background:var(--inkSoft);display:inline-flex;align-items:center;gap:6px">👥 <button onclick="setCoperti(-1)" style="color:var(--paper);opacity:.8;font-weight:700">−</button><b class="tab">${coperti()}</b><button onclick="setCoperti(1)" style="color:var(--paper);opacity:.8;font-weight:700">＋</button></span>`:""}<span class="tab" style="padding:6px 12px;border-radius:999px;background:${lowTime?'var(--coralDeep)':'var(--inkSoft)'}">⏱ <b>${fmt(g.tempoLeft)}</b></span></div></div></header>`;}

function bannerHTML(){const b=CONF.banner;if(!b||!b.attivo||!b.img)return "";
 const inner=`<img src="${esc(b.img)}" alt="" style="width:100%;display:block;border-radius:16px">${b.testo?`<div style="position:absolute;left:16px;bottom:12px;color:#fff;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.6)" class="disp">${esc(b.testo)}</div>`:""}`;
 return `<div class="wrap" style="padding-top:16px"><div style="position:relative;border-radius:16px;overflow:hidden">${b.link?`<a href="${esc(b.link)}" target="_blank">${inner}</a>`:inner}</div></div>`;}

function bodyHTML(){
  const favs=MENU.filter(p=>isFav(p.id)&&regola(p.id).attivo);
  const cats=[]; MENU.forEach(p=>{if(regola(p.id).attivo&&!cats.includes(p.cat))cats.push(p.cat);});
  const allCats=(favs.length?["★ Preferiti"]:[]).concat(cats);
  if(!activeCat||!allCats.includes(activeCat))activeCat=allCats[0];
  const visible = activeCat==="★ Preferiti" ? favs : MENU.filter(p=>p.cat===activeCat&&regola(p.id).attivo);
  const g=globals();
  const cards=visible.map(p=>card(p)).join("");
  const catbar=allCats.map(c=>`<button onclick="activeCat='${esc(c).replace(/'/g,"")}';render()" class="catbtn disp ${c===activeCat?'on':''}">${esc(c)}</button>`).join("");
  const giri=GIRI.length?`<section style="margin-top:40px"><h2 class="disp" style="font-size:20px;font-weight:800;margin:0 0 12px">Giri inviati</h2>${GIRI.map(gi=>`<div class="card" style="padding:16px;margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px"><span class="disp" style="font-weight:800;font-size:18px">Giro ${gi.numero_giro}</span><span style="font-size:12px;padding:2px 8px;border-radius:999px;font-weight:600;background:#EEF3E6;color:var(--wasabi)">🍳 ${gi.id_ordine_pn?'ordine #'+gi.id_ordine_pn:'in cucina'}</span></div><span class="muted tab" style="font-size:12px">${new Date(gi.inviato_il).toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})}</span></div><div class="muted" style="font-size:14px;display:flex;flex-wrap:wrap;gap:2px 16px">${Object.entries(gi.items).map(([id,v])=>`<span><b style="color:var(--ink)">${v.qty}×</b> ${esc(v.nome)}</span>`).join("")}</div></div>`).join("")}</section>`:"";
  return `<div class="wrap layout"><main style="padding-top:16px"><h1 class="disp" style="font-size:30px;font-weight:800;margin:0 0 12px">Componi il giro</h1><div class="noscroll" style="display:flex;gap:8px;overflow-x:auto;margin:0 -16px;padding:8px 16px;position:sticky;top:60px;z-index:10;background:var(--paper)">${catbar}</div><div class="grid2" style="margin-top:12px">${cards}</div>${giri}</main><aside class="aside" style="padding-top:16px"><div style="position:sticky;top:84px;border-radius:16px;overflow:hidden;background:var(--ink);color:var(--paper)">${roundPanel(g)}</div></aside></div>
  <div class="mobround"><div id="sheetInner"></div><button onclick="toggleSheet()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:${g.count&&!g.blocked?'var(--coral)':'var(--ink)'};color:var(--paper)"><span class="disp" style="font-weight:800;font-size:18px">${g.count===0?'Giro vuoto':'Giro · '+g.count+' pezzi'}</span><span style="font-weight:700">apri/chiudi ▲</span></button></div>`;}

function card(p){const qty=qtyInCart(p.id),rem=remaining(p.id),so=rem===0,ev=isEvid(p.id);
 const badge=rem===Infinity?"":`<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;flex:0 0 auto;background:${so?'#F6E3DE':'#F0EFEA'};color:${so?'var(--coralDeep)':'var(--muted)'}">${so?'limite':'ancora '+rem}</span>`;
 const ctrl=qty===0?`<button onclick="modifica(${p.id},1)" ${so?'disabled':''} style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:999px;font-weight:700;font-size:14px;background:${so?'var(--line)':'var(--ink)'};color:${so?'var(--muted)':'var(--paper)'}">＋ Aggiungi</button>`:`<div style="display:flex;align-items:center;gap:12px;padding:4px 8px;border-radius:999px;background:var(--ink);color:var(--paper)"><button onclick="modifica(${p.id},-1)" style="padding:6px;color:var(--paper)">－</button><span class="pop tab" style="font-weight:700;width:20px;text-align:center;color:var(--coral)">${qty}</span><button onclick="modifica(${p.id},1)" ${canAdd(p.id)?'':'disabled'} style="padding:6px;color:var(--paper);opacity:${canAdd(p.id)?1:.3}">＋</button></div>`;
 return `<div class="card" style="padding:16px;display:flex;flex-direction:column;justify-content:space-between;opacity:${so?.55:1};${ev?'border:2px solid var(--gold);box-shadow:0 4px 20px rgba(224,161,0,.15)':''}"><div><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><h3 class="disp" style="font-weight:700;font-size:18px;line-height:1.1;margin:0">${isFav(p.id)?'★ ':''}${esc(p.name)}</h3>${ev?'<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--gold);color:#fff;flex:0 0 auto">in evidenza</span>':badge}</div>${p.description?`<p class="muted" style="font-size:14px;margin:4px 0 0;line-height:1.3">${esc(p.description)}</p>`:''}</div><div style="display:flex;justify-content:flex-end;margin-top:16px">${ctrl}</div></div>`;}

function roundPanel(g){
 const items=g.items.map(i=>`<div style="display:flex;align-items:center;justify-content:space-between;gap:12px"><span style="font-size:14px">${esc(i.nome)}</span><div style="display:flex;align-items:center;gap:8px;flex:0 0 auto"><button onclick="modifica(${i.id},-1)" style="padding:4px;border-radius:999px;background:var(--inkSoft);color:var(--paper)">－</button><span class="tab" style="font-weight:700;width:20px;text-align:center;font-size:14px">${i.qty}</span><button onclick="modifica(${i.id},1)" ${canAdd(i.id)?'':'disabled'} style="padding:4px;border-radius:999px;background:var(--inkSoft);color:var(--paper);opacity:${canAdd(i.id)?1:.3}">＋</button></div></div>`).join("");
 const notes=[];
 if(g.over)notes.push(`<p class="note" style="background:var(--coralDeep)">Max ${g.maxGiro} pezzi a giro. Togline ${g.count-g.maxGiro}.</p>`);
 if(g.tempoLeft===0)notes.push(`<p class="note" style="background:var(--coralDeep)">Tempo tavolo terminato.</p>`);
 if(g.cooldownLeft>0&&!g.over&&g.tempoLeft>0)notes.push(`<p class="note" style="background:var(--inkSoft)">Prossimo giro tra ${fmt(g.cooldownLeft)}.</p>`);
 if(sendMsg.k==="err")notes.push(`<p class="note" style="background:var(--coralDeep)">⚠ ${esc(sendMsg.t)}</p>`);
 if(sendMsg.k==="ok")notes.push(`<p class="note" style="background:var(--wasabi)">✓ ${esc(sendMsg.t)}</p>`);
 const canSend=g.count&&!g.blocked&&!sending;
 return `<div><div style="padding:20px 20px 16px;border-bottom:1px solid var(--inkSoft)"><p style="font-size:12px;text-transform:uppercase;letter-spacing:.15em;opacity:.5;margin:0">Giro corrente · condiviso</p><p class="disp" style="font-size:30px;font-weight:800;line-height:1;margin:4px 0 0"><span style="color:${g.over?'var(--coral)':'var(--paper)'}">${g.count}</span>${g.maxGiro!==Infinity?`<span style="opacity:.4;font-size:20px"> / ${g.maxGiro} pezzi</span>`:''}</p></div><div class="noscroll" style="padding:12px 20px;max-height:260px;overflow:auto">${g.items.length?`<div style="display:flex;flex-direction:column;gap:8px">${items}</div>`:`<p style="opacity:.6;font-size:14px;text-align:center;padding:24px 0">Tocca i piatti per comporre il giro.</p>`}</div><div style="padding:8px 20px 20px">${notes.join("")}<button onclick="invia()" ${canSend?'':'disabled'} class="disp" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:12px;font-weight:800;font-size:18px;background:${canSend?'var(--coral)':'var(--inkSoft)'};color:var(--paper);opacity:${canSend?1:.5}">${sending?'<span class="spin">◠</span> Invio…':'✓ Invia il giro'}</button><p style="font-size:11px;opacity:.5;text-align:center;margin:8px 0 0">Ordina solo ciò che mangi.</p></div></div>`;}

let sheetOpen=false;
function toggleSheet(){sheetOpen=!sheetOpen;const el=document.getElementById("sheetInner");if(el)el.innerHTML=sheetOpen?`<div style="margin:0 12px 8px;border-radius:16px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.3);background:var(--ink);color:var(--paper)">${roundPanel(globals())}</div>`:"";}

/* ---- timer tempo tavolo / cooldown ---- */
setInterval(()=>{if(TAVOLO){now=Date.now();render();}},1000);

/* ============================ INIT ============================ */
(async function init(){
  render();
  if(!SLUG||!QR)return;
  try{
    const {data:loc}=await sb.from("locali").select("*").eq("slug",SLUG).single();
    LOCALE=loc; CONF=loc.config||{};
    const {data:tav}=await sb.from("tavoli").select("*").eq("locale_id",loc.id).eq("qr_token",QR).single();
    if(!tav)throw new Error("tavolo non trovato");
    TAVOLO=tav;
    const {data:cart}=await sb.rpc("carrello_del_tavolo",{p_tavolo:tav.id});
    CART=cart;
    // storico giri di oggi
    const {data:giri}=await sb.from("giri").select("*").eq("tavolo_id",tav.id).order("numero_giro",{ascending:false});
    GIRI=giri||[];
    // menu dal server (senza esporre creds)
    const m=await fn("get-menu",{slug:SLUG}); MENU=m.menu||[];
    render();
    // REALTIME: carrello condiviso + nuovi giri
    sb.channel("cart-"+CART.id).on("postgres_changes",{event:"UPDATE",schema:"public",table:"carrelli",filter:"id=eq."+CART.id},p=>{CART=p.new;render();}).subscribe();
    sb.channel("giri-"+tav.id).on("postgres_changes",{event:"INSERT",schema:"public",table:"giri",filter:"tavolo_id=eq."+tav.id},p=>{GIRI.unshift(p.new);render();}).subscribe();
  }catch(e){app.innerHTML=msgBox("Errore: "+e.message);}
})();
</script></body></html>
