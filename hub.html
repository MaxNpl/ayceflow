<!DOCTYPE html>
<html lang="it"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AYCEflow · Ristoratore</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap');
:root{--ink:#181821;--paper:#FAF6EF;--coral:#F2542D;--wasabi:#6F8F3E;--line:#ECE4D7;--muted:#76716A;--rosso:#B0331A}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.disp{font-family:'Bricolage Grotesque',system-ui}
.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:28px;width:100%;max-width:420px}
.tile{display:block;text-decoration:none;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px 24px;margin-top:12px;transition:box-shadow .15s,border-color .15s}
.tile:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);border-color:#ccc}
.tile-icon{font-size:28px;margin-bottom:4px}
.tile-title{font-weight:700;font-size:17px;font-family:'Bricolage Grotesque',system-ui}
.tile-desc{font-size:13px;color:var(--muted);margin-top:2px}
input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:15px;margin-top:4px}
label{font-size:12px;font-weight:600;color:var(--muted)}
button{border:none;border-radius:10px;padding:12px 18px;font-weight:700;cursor:pointer;font-family:inherit;font-size:15px}
.btn{background:var(--coral);color:#fff;width:100%;margin-top:14px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
.ok{background:#EEF3E6;color:var(--wasabi)}.err{background:#FDE8E1;color:var(--rosso)}
.msg{font-size:13px;margin-top:10px}
</style></head><body>

<!-- LOGIN -->
<div class="card" id="login">
  <h1 class="disp" style="font-size:34px;font-weight:800;color:var(--coral);margin:0">AYCEflow</h1>
  <p style="margin:2px 0 20px;color:var(--muted);font-size:14px">Area ristoratore</p>
  <label>Codice locale</label>
  <input id="slug" placeholder="es. sakura" autocapitalize="off" autocorrect="off">
  <label style="display:block;margin-top:12px">PIN</label>
  <input id="pin" type="password" inputmode="numeric" placeholder="il tuo PIN" onkeydown="if(event.key==='Enter')entra()">
  <button class="btn" onclick="entra()">Entra →</button>
  <div id="msg" class="msg"></div>
</div>

<!-- PANNELLO -->
<div class="card" id="pannello" style="display:none">
  <h1 class="disp" style="font-size:30px;font-weight:800;color:var(--coral);margin:0" id="nomeLoc">AYCEflow</h1>
  <p style="margin:2px 0 6px;color:var(--muted);font-size:13px">Area ristoratore · <span id="slugLbl"></span> <button onclick="esci()" style="background:none;color:var(--muted);text-decoration:underline;padding:0;font-size:12px">esci</button></p>
  <div id="lic"></div>
  <a id="tImp" class="tile"><div class="tile-icon">⚙️</div><div class="tile-title">Impostazioni</div><div class="tile-desc">Regole AYCE, banner, preferiti, chiusura tavoli</div></a>
  <a id="tQr"  class="tile"><div class="tile-icon">📱</div><div class="tile-title">Genera QR tavoli</div><div class="tile-desc">Stampa i QR da mettere sui tavoli</div></a>
  <a id="tLog" class="tile"><div class="tile-icon">📋</div><div class="tile-title">Log eventi</div><div class="tile-desc">Ordini, errori, chiusure del tuo locale</div></a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
/* ============================================================================
   hub.html — Area RISTORATORE (cliente).
   Il ristoratore entra col CODICE del suo locale + PIN. Vede e gestisce SOLO
   il suo locale. Il codice non sta piu' in config.js: lo digita al login, e il
   PIN viene verificato lato server (funzione verifica_pin_locale).
   ============================================================================ */
const {SUPABASE_URL, SUPABASE_ANON_KEY} = window.AYCE_CFG || {};
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// se ho gia' fatto login in questa sessione, entro dritto
const salvato = sessionStorage.getItem("ayce_ristoratore");
if(salvato){ try{ const {slug,pin}=JSON.parse(salvato); mostraPannello(slug,pin); }catch(_){} }

async function entra(){
  const slug = document.getElementById("slug").value.trim().toLowerCase();
  const pin  = document.getElementById("pin").value.trim();
  const msg = document.getElementById("msg");
  if(!slug||!pin){ msg.innerHTML='<span class="badge err">Compila codice e PIN</span>'; return; }
  msg.textContent="Verifica…";
  try{
    const {data:ok, error} = await sb.rpc("verifica_pin_locale",{p_slug:slug,p_pin:pin});
    if(error) throw new Error(error.message);
    if(!ok){ msg.innerHTML='<span class="badge err">Codice o PIN errato</span>'; return; }
    sessionStorage.setItem("ayce_ristoratore", JSON.stringify({slug,pin}));
    mostraPannello(slug,pin);
  }catch(e){ msg.innerHTML='<span class="badge err">'+esc(e.message)+'</span>'; }
}

async function mostraPannello(slug,pin){
  // carico nome + stato licenza del locale
  let nome=slug, lic=null;
  try{
    const {data} = await sb.from("locali").select("nome,licenza_attiva,licenza_scadenza").eq("slug",slug).single();
    if(data){ nome=data.nome; lic=data; }
  }catch(_){}
  document.getElementById("login").style.display="none";
  document.getElementById("pannello").style.display="block";
  document.getElementById("nomeLoc").textContent=nome;
  document.getElementById("slugLbl").textContent=slug;
  // i link portano gli strumenti del SUO locale (slug + pin nell'url della sessione)
  document.getElementById("tImp").href = "admin.html?l="+encodeURIComponent(slug);
  document.getElementById("tQr").href  = "qr.html?l="+encodeURIComponent(slug);
  document.getElementById("tLog").href = "log.html?l="+encodeURIComponent(slug);
  // avviso licenza
  const box=document.getElementById("lic");
  if(lic && lic.licenza_attiva===false){ box.innerHTML='<div class="msg"><span class="badge err">licenza sospesa</span> Contatta Pezzanera.</div>'; }
  else if(lic && lic.licenza_scadenza){ box.innerHTML='<div class="msg"><span class="badge ok">attiva</span> scade il '+esc(lic.licenza_scadenza)+'</div>'; }
}
function esci(){ sessionStorage.removeItem("ayce_ristoratore"); location.reload(); }
</script>

<!-- pulsante fisso: torna alla pagina d'ingresso (start.html) senza digitare url -->
<a href="start.html" title="Pagina d'ingresso" style="position:fixed;left:16px;bottom:16px;z-index:9999;width:48px;height:48px;border-radius:50%;background:#181821;color:#fff;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 4px 14px rgba(0,0,0,.25);font-size:20px">🏠</a>
</body></html>
